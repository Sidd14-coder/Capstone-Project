name: expense
description: "Expense Tracker App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase dependencies (REQUIRED)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  google_sign_in: ^6.2.1

  # Existing dependencies
  fl_chart: ^0.68.0
  pdf: ^3.10.7
  cupertino_icons: ^1.0.8
  telephony: ^0.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  flutter_local_notifications: ^17.1.2

  http: ^0.13.6 #new

  timezone: ^0.9.2

  intl: ^0.19.0

  # ✅ REQUIRED FOR INVITE FRIENDS
  printing: ^5.12.0
  share_plus: ^9.0.0

  # ✅ OPEN SOCIAL MEDIA LINKS
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ✅ APP ICON GENERATOR
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/banks/

# ✅ APP ICON CONFIGURATION
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
